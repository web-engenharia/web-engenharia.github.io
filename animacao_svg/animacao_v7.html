<!DOCTYPE html>
<html lang="pt-BR" style="
    overflow: hidden;
">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Animada - Web-Engenharia</title>
    <!-- Importando fonte para o texto -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-base: #062A1B;      /* Verde escuro intenso */
            --cor-circuito: #A5C7A9;  /* Verde claro (trilhas elétricas) */
            --cor-pulso: #E2F2E4;     /* Verde super brilhante */
            --cor-passaro: #62866D;   /* Verde médio (símbolo) */
            --cor-fundo: #ffffff;
            --cor-texto: #000000;
            /* Cores do Glitch Matrix */
            --glitch-cyan: #85E8B1;   /* Verde menta luminoso */
            --glitch-magenta: #00FF41; /* Verde neon vibrante */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--cor-fundo);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
        }

        /* ==========================================
           CICLO MESTRE (14 Segundos)
           ========================================== */

        /* Movimento físico das peças (Transformer) */
        @keyframes assemble {
            0%, 5% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.1); opacity: 0; filter: blur(10px); }
            12% { transform: translate(calc(var(--dx) * 0.2), calc(var(--dy) * 0.2)) rotate(calc(var(--rot) * 0.2)) scale(1.1); opacity: 1; filter: blur(2px); }
            15% { transform: translate(0, 0) rotate(0) scale(0.95); filter: blur(0px); }
            18%, 82% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; filter: blur(0px); }
            85% { transform: translate(0, 0) rotate(0) scale(1.05); opacity: 1; filter: drop-shadow(0 0 10px var(--glitch-cyan)); }
            95%, 100% { transform: translate(var(--dx), var(--dy)) rotate(calc(var(--rot) * -1.5)) scale(0.1); opacity: 0; filter: blur(10px); }
        }

        /* Glitch da estrutura principal e do pássaro */
        @keyframes glitchMain {
            0%, 14% { opacity: 0; stroke-dashoffset: 1; }
            15% { opacity: 1; stroke-dashoffset: 0; transform: translateX(-10px) skewX(20deg); filter: drop-shadow(10px 0 0 var(--glitch-cyan)) drop-shadow(-10px 0 0 var(--glitch-magenta)); }
            17% { transform: translateX(10px) skewX(-10deg); filter: drop-shadow(-10px 0 0 var(--glitch-cyan)) drop-shadow(10px 0 0 var(--glitch-magenta)); }
            19%, 39% { transform: translateX(0) skewX(0); filter: drop-shadow(0 0 0 transparent); }
            
            /* Micro glitches durante o período estável */
            40% { transform: translate(-2px, 1px) skewX(-5deg); filter: drop-shadow(2px 0 0 var(--glitch-cyan)); }
            41% { transform: translate(2px, -1px) skewX(5deg); filter: drop-shadow(-2px 0 0 var(--glitch-magenta)); }
            42%, 69% { transform: translate(0, 0) skewX(0); filter: drop-shadow(0 0 0 transparent); }
            70% { transform: translate(-2px, 1px) skewX(-5deg); filter: drop-shadow(2px 0 0 var(--glitch-cyan)); }
            71% { transform: translate(2px, -1px) skewX(5deg); filter: drop-shadow(-2px 0 0 var(--glitch-magenta)); }
            72%, 82% { transform: translate(0, 0) skewX(0); filter: drop-shadow(0 0 0 transparent); }
            
            /* Glitch de colapso */
            83% { transform: translateX(-10px) skewX(20deg); filter: drop-shadow(10px 0 0 var(--glitch-cyan)); }
            85%, 100% { opacity: 0; stroke-dashoffset: 1; }
        }

        /* Animação das linhas de circuito erráticas */
        @keyframes drawTrace {
            0%, 10% { opacity: 0; stroke-dashoffset: 1; }
            12% { opacity: 1; stroke-dashoffset: 0.5; filter: drop-shadow(0 0 10px var(--glitch-cyan)); stroke-width: 8; }
            15%, 82% { opacity: 1; stroke-dashoffset: 0; filter: drop-shadow(0 0 0 transparent); stroke-width: 4; }
            85%, 100% { opacity: 0; stroke-dashoffset: 1; }
        }

        /* Visibilidade e brilho da energia (Nós e Pulsos) */
        @keyframes powerVisibility {
            0%, 15% { opacity: 0; filter: brightness(0); }
            16%, 81% { opacity: 1; filter: brightness(1.2); }
            82%, 100% { opacity: 0; filter: brightness(0); }
        }

        /* Movimento contínuo do feixe de energia na trilha */
        @keyframes dataPulseFlow {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -1.05; }
        }

        /* O texto também sofre corrupção ao montar e desmontar */
        @keyframes textGlitch {
            0%, 14% { opacity: 0; letter-spacing: -10px; transform: scaleY(0.1); filter: blur(5px); }
            16% { opacity: 1; letter-spacing: 25px; transform: scaleY(2); filter: drop-shadow(5px 5px 0 var(--glitch-cyan)); }
            18% { transform: scaleY(1); filter: drop-shadow(-5px -5px 0 var(--glitch-magenta)); letter-spacing: 18px; }
            20%, 82% { opacity: 1; transform: scaleY(1); filter: drop-shadow(0 0 0 transparent); letter-spacing: 18px; }
            84%, 100% { opacity: 0; letter-spacing: -10px; transform: scaleY(0.1); filter: blur(5px); }
        }

        /* ==========================================
           CLASSES DOS ELEMENTOS SVG
           ========================================== */

        /* Container de cada peça do quebra-cabeça */
        .puzzle-piece {
            transform-origin: center;
            transform-box: fill-box;
            animation: assemble 14s cubic-bezier(0.25, 1, 0.5, 1) infinite;
            /* O delay de cada peça é importado via variável local no HTML */
            animation-delay: var(--delay, 0s); 
        }

        /* Herdamos o delay do pai para que as animações internas fiquem sincronizadas com o voo da peça */
        .glitch-main {
            stroke: var(--cor-base);
            stroke-width: 18;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: glitchMain 14s infinite;
            animation-delay: var(--delay, 0s); 
            transform-origin: center;
            transform-box: fill-box;
        }

        .bird-part {
            fill: var(--cor-passaro);
            animation: glitchMain 14s infinite;
            animation-delay: var(--delay, 0s);
            transform-origin: center;
            transform-box: fill-box;
            mix-blend-mode: multiply;
        }

        .pcb-trace {
            stroke: var(--cor-circuito);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel; 
            stroke-dasharray: 1;
            animation: drawTrace 14s infinite;
            animation-delay: var(--delay, 0s);
        }

        .power-state {
            animation: powerVisibility 14s infinite;
            animation-delay: var(--delay, 0s);
        }

        .pcb-pulse {
            stroke: var(--cor-pulso);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel;
            stroke-dasharray: 0.05 1.05; 
            animation: dataPulseFlow 2s linear infinite;
            /* O fluxo contínuo não leva delay, apenas a visibilidade (power-state) que o envolve */
        }

        .pcb-node-solid { fill: var(--cor-circuito); stroke: none; }
        .pcb-node-hollow { fill: var(--cor-fundo); stroke: var(--cor-circuito); stroke-width: 4; }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px; 
            font-weight: 300; 
            fill: var(--cor-texto);
            animation: textGlitch 14s infinite;
            animation-delay: var(--delay, 0s);
            transform-origin: center;
        }

        .bg-dot {
            fill: #E5EBE5;
            animation: drawTrace 14s infinite;
            animation-delay: var(--delay, 0s);
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <!-- SVG desenhado para montagem modular -->

            <!-- CAMADA 0: PONTOS DE FUNDO (VOANDO DO CENTRO) -->

                <path class="pcb-trace" pathLength="1" d="M 485 425 L 485 440" />

                    <circle cx="485" cy="450" r="8" class="pcb-node-hollow" />
                </g>
            </g>

            <g class="puzzle-piece" style="--dx: -400px; --dy: -100px; --rot: 90deg; --delay: 0.3s;">
                <path class="pcb-trace" pathLength="1" d="M 130 350 L 160 350 L 170 340 L 170 290 L 180 280 L 205 280 L 215 290 L 215 425" />
                <g class="power-state">
                    <path class="pcb-pulse" pathLength="1" d="M 130 350 L 160 350 L 170 340 L 170 290 L 180 280 L 205 280 L 215 290 L 215 425" />
                    <circle cx="130" cy="350" r="6" class="pcb-node-solid" />

                </g>
            </g>

            <g class="puzzle-piece" style="--dx: -100px; --dy: -300px; --rot: -135deg; --delay: 0.4s;">
                <path class="pcb-trace" pathLength="1" d="M 235 380 L 235 345 L 245 335 L 255 345 L 255 380" />
                <path class="pcb-trace" pathLength="1" d="M 285 425 L 285 150" />
                <path class="pcb-trace" pathLength="1" d="M 285 190 L 275 180 L 260 180" />
                <g class="power-state">
                    <path class="pcb-pulse" pathLength="1" d="M 285 425 L 285 150" />
                    <circle cx="285" cy="150" r="6" class="pcb-node-solid" />
                    <circle cx="260" cy="180" r="4" class="pcb-node-solid" />
                </g>
            </g>

            <g class="puzzle-piece" style="--dx: 0px; --dy: 300px; --rot: 180deg; --delay: 0.5s;">
                <path class="pcb-trace" pathLength="1" d="M 315 380 L 315 245 L 325 235 L 335 245 L 335 380" />
                <path class="pcb-trace" pathLength="1" d="M 365 425 L 365 200" />
                <path class="pcb-trace" pathLength="1" d="M 365 240 L 375 230 L 390 230" />
                <path class="pcb-trace" pathLength="1" d="M 395 380 L 395 305 L 405 295 L 415 305 L 415 380" />
                <g class="power-state">
                    <path class="pcb-pulse" pathLength="1" d="M 365 425 L 365 200" />
                    <circle cx="365" cy="200" r="5" class="pcb-node-solid" />
                    <circle cx="390" cy="230" r="4" class="pcb-node-solid" />
                </g>
            </g>

            <g class="puzzle-piece" style="--dx: 300px; --dy: -300px; --rot: 270deg; --delay: 0.6s;">
                <path class="pcb-trace" pathLength="1" d="M 445 425 L 445 280" />
                <path class="pcb-trace" pathLength="1" d="M 475 380 L 475 245 L 485 235 L 495 245 L 495 380" />
                <path class="pcb-trace" pathLength="1" d="M 525 425 L 525 320 L 535 310 L 575 310" />
                <g class="power-state">
                    <path class="pcb-pulse" pathLength="1" d="M 445 425 L 445 280" />
                    <circle cx="445" cy="280" r="5" class="pcb-node-solid" />
                    <circle cx="575" cy="310" r="6" class="pcb-node-solid" />
                </g>
            </g>

            <!-- ========================================== -->
            <!-- CAMADA 2: ESTRUTURA PRINCIPAL DESMONTADA   -->
            <!-- ========================================== -->
            
            <g class="puzzle-piece" style="--dx: -300px; --dy: -200px; --rot: -90deg; --delay: 0.1s;">
                <path class="glitch-main" pathLength="1" d="M 170 380 L 220 380" />
            </g>
            
            <g class="puzzle-piece" style="--dx: -150px; --dy: 300px; --rot: 45deg; --delay: 0.2s;">
                <path class="glitch-main" pathLength="1" d="M 220 380 L 220 310 A 25 25 0 0 1 270 310 L 270 380" />
            </g>
            
            <g class="puzzle-piece" style="--dx: 0px; --dy: -400px; --rot: 180deg; --delay: 0.3s;">
                <path class="glitch-main" pathLength="1" d="M 270 380 L 300 380" />
            </g>
            
            <g class="puzzle-piece" style="--dx: 300px; --dy: 100px; --rot: -135deg; --delay: 0.4s;">
                <path class="glitch-main" pathLength="1" d="M 300 380 L 300 180 A 25 25 0 0 1 350 180 L 350 380" />
            </g>
            
            <g class="puzzle-piece" style="--dx: 100px; --dy: -200px; --rot: 90deg; --delay: 0.5s;">
                <path class="glitch-main" pathLength="1" d="M 350 380 L 380 380" />
            </g>
            
            <g class="puzzle-piece" style="--dx: -200px; --dy: 200px; --rot: -45deg; --delay: 0.6s;">
                <path class="glitch-main" pathLength="1" d="M 380 380 L 380 250 A 25 25 0 0 1 430 250 L 430 380" />
            </g>
            
            <g class="puzzle-piece" style="--dx: 400px; --dy: -300px; --rot: 270deg; --delay: 0.7s;">

            <g class="puzzle-piece" style="--dx: 200px; --dy: 400px; --rot: 135deg; --delay: 0.8s;">

                <path class="glitch-main" pathLength="1" d="M 510 380 L 590 380" />
            </g>


            <!-- ========================================== -->
            <!-- CAMADA 3: PÁSSARO DESMONTÁVEL & GLITCH     -->
            <!-- ========================================== -->
            
            <!-- Cauda -->
            <g class="puzzle-piece" style="--dx: 0px; --dy: -300px; --rot: 360deg; --delay: 1.0s;">
                <path class="bird-part" d="M 425 258 Q 440 290 475 255 Q 440 265 425 258 Z" opacity="0.6"/>
                <path class="bird-part" d="M 430 260 Q 440 280 460 260 Q 440 265 430 260 Z" />
            </g>

            <!-- Asa Esquerda -->
            <g class="puzzle-piece" style="--dx: -400px; --dy: -200px; --rot: 180deg; --delay: 1.1s;">
                <path class="bird-part" d="M 440 265 C 380 265 330 200 290 120 C 350 140 400 210 440 235 Z" />
            </g>

            <!-- Asa Direita -->
            <g class="puzzle-piece" style="--dx: 400px; --dy: -200px; --rot: -180deg; --delay: 1.2s;">
                <path class="bird-part" d="M 440 235 C 480 210 540 140 600 120 C 550 200 490 265 440 265 Z" />
            </g>

            <!-- ========================================== -->
            <!-- CAMADA 4: TEXTO DA MARCA                   -->
            <!-- ========================================== -->
            <g class="puzzle-piece" style="--dx: 0px; --dy: 300px; --rot: 0deg; --delay: 1.4s;">
                <text x="400" y="495" text-anchor="middle" class="logo-text">
                    WEB-ENGENHARIA
                </text>
            </g>

        </svg>
    </div>

</body>
</html>
