<!DOCTYPE html>
<html lang="pt-BR" style="
    overflow: hidden;
">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Animada - Web-Engenharia</title>
    <!-- Importando fonte para o texto -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-base: #062A1B;      /* Verde escuro intenso */
            --cor-circuito: #A5C7A9;  /* Verde claro (trilhas elétricas) */
            --cor-pulso: #E2F2E4;     /* Verde super brilhante */
            --cor-passaro: #62866D;   /* Verde médio (símbolo) */
            --cor-fundo: #ffffff;
            --cor-texto: #000000;
            /* Cores do Glitch Matrix */
            --glitch-cyan: #85E8B1;   /* Verde menta luminoso */
            --glitch-magenta: #00FF41; /* Verde neon vibrante */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--cor-fundo);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            /* Tremor de montagem, sobrecarga e remontagem combinados */
            animation: containerShakeLoop 14s infinite;
        }

        /* Clarão do núcleo (Explosão Expansiva e Implosão Magnética) */
        .explosion-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            box-shadow: 0 0 50px 20px var(--glitch-cyan), 0 0 100px 50px var(--glitch-magenta);
            animation: flashCore 14s infinite;
            z-index: 100;
            pointer-events: none;
        }

        /* ==========================================
           CICLO MESTRE ÉPICO (14 Segundos)
           Montagem -> Explosão -> Flutuação -> Remontagem Magnética
           ========================================== */

        /* Coreografia física de todas as peças */
        @keyframes assemble {
            /* Entrada inicial */
            0%, 5% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.1); opacity: 0; filter: blur(10px); }
            10% { transform: translate(calc(var(--dx) * 0.2), calc(var(--dy) * 0.2)) rotate(calc(var(--rot) * 0.2)) scale(1.1); opacity: 1; filter: blur(2px); }
            13%, 45% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; filter: blur(0px) drop-shadow(0 0 0 transparent); }
            
            /* Acumulação de Energia (Shrink & Shake) antes de quebrar */
            46%, 49% { transform: translate(0, 0) rotate(0) scale(0.93); opacity: 1; filter: blur(0px) drop-shadow(0 0 10px var(--glitch-cyan)); }
            
            /* A EXPLOSÃO (Boom!) - Estilhaçamento para fora */
            50% { transform: translate(calc(var(--dx) * 3), calc(var(--dy) * 3)) rotate(calc(var(--rot) * 3)) scale(1.5); opacity: 1; filter: blur(5px); }
            
            /* Flutuando no espaço em câmera lenta (Debris em Zero-G) */
            65% { transform: translate(calc(var(--dx) * 3.5), calc(var(--dy) * 3.5)) rotate(calc(var(--rot) * 3.5)) scale(1.6); opacity: 0.8; filter: blur(8px); }
            
            /* REVERSÃO DO TEMPO / IMPLOSÃO MAGNÉTICA */
            70% { transform: translate(calc(var(--dx) * 3.5), calc(var(--dy) * 3.5)) rotate(calc(var(--rot) * 3.5)) scale(1.6); opacity: 1; filter: blur(2px) drop-shadow(0 0 15px var(--glitch-magenta)); } /* Congela e brilha antes do puxão */
            73% { transform: translate(calc(var(--dx) * -0.2), calc(var(--dy) * -0.2)) rotate(calc(var(--rot) * -0.5)) scale(0.9); opacity: 1; filter: blur(2px); } /* Passa do centro (Overshoot) devido à força */
            75%, 90% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; filter: blur(0px) drop-shadow(0 0 0 transparent); } /* Estabiliza montado novamente */

            /* Desaparece no void para recomeçar o loop */
            95%, 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.1); opacity: 0; filter: blur(10px); }
        }

        /* Controle do clarão duplo (Explosão Expandindo e Remontagem Implodindo) */
        @keyframes flashCore {
            0%, 48% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            /* Flash da Explosão (Expandindo) */
            49% { transform: translate(-50%, -50%) scale(2); opacity: 1; background: #fff; }
            50% { transform: translate(-50%, -50%) scale(80); opacity: 1; background: var(--glitch-cyan); }
            52%, 71% { transform: translate(-50%, -50%) scale(100); opacity: 0; }
            /* Flash da Remontagem (Implodindo) */
            72% { transform: translate(-50%, -50%) scale(50); opacity: 1; background: var(--glitch-magenta); }
            73% { transform: translate(-50%, -50%) scale(2); opacity: 1; background: #fff; }
            75%, 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }

        /* Glitch visual apenas na estrutura base */
        @keyframes glitchMain {
            0%, 12% { opacity: 0; stroke-dashoffset: 1; }
            13% { opacity: 1; stroke-dashoffset: 0; transform: translateX(-10px) skewX(20deg); filter: drop-shadow(10px 0 0 var(--glitch-cyan)); }
            15%, 45% { transform: translateX(0) skewX(0); filter: drop-shadow(0 0 0 transparent); opacity: 1; }
            
            /* Glitch pré-explosão */
            46% { transform: translateX(-5px) skewX(10deg); filter: drop-shadow(10px 0 0 var(--glitch-cyan)); opacity: 1; }
            48% { transform: translateX(5px) skewX(-10deg); filter: drop-shadow(-10px 0 0 var(--glitch-magenta)); opacity: 1; }
            
            /* Sem glitch extra durante a flutuação, apenas a opacidade controlada pelo "assemble" pai */
            49%, 71% { transform: translateX(0) skewX(0); filter: drop-shadow(0 0 0 transparent); opacity: 1; }
            
            /* Glitch da remontagem */
            73% { transform: translateX(-10px) skewX(20deg); filter: drop-shadow(10px 0 0 var(--glitch-cyan)); opacity: 1; }
            75%, 90% { transform: translateX(0) skewX(0); filter: drop-shadow(0 0 0 transparent); opacity: 1; }
            95%, 100% { opacity: 0; stroke-dashoffset: 1; }
        }

        /* Tremor agressivo da Câmera / Container */
        @keyframes containerShakeLoop {
            0%, 12% { transform: translate3d(0, 0, 0); }
            /* Tremor da primeira montagem */
            13% { transform: translate3d(-4px, 0, 0); }
            14% { transform: translate3d(4px, 0, 0); }
            15%, 45% { transform: translate3d(0, 0, 0); }
            
            /* Sobrecarga pré-explosão */
            46% { transform: translate3d(-2px, 2px, 0); }
            47% { transform: translate3d(4px, -2px, 0); }
            48% { transform: translate3d(-6px, 3px, 0); }
            49% { transform: translate3d(6px, -3px, 0); }
            50%, 71% { transform: translate3d(0, 0, 0); }

            /* Tremor da remontagem magnética */
            72% { transform: translate3d(-6px, 0, 0); }
            73% { transform: translate3d(6px, 0, 0); }
            75%, 100% { transform: translate3d(0, 0, 0); }
        }

        /* Animação das linhas elétricas para ligar/desligar com as montagens */
        @keyframes drawTrace {
            0%, 10% { opacity: 0; stroke-dashoffset: 1; }
            12% { opacity: 1; stroke-dashoffset: 0; stroke-width: 8; filter: drop-shadow(0 0 10px var(--glitch-cyan)); }
            14%, 48% { opacity: 1; stroke-dashoffset: 0; stroke-width: 4; filter: drop-shadow(0 0 0 transparent); }
            
            /* Apagadas durante a explosão e flutuação */
            50%, 71% { opacity: 0; stroke-dashoffset: 1; } 
            
            /* Religam durante a remontagem magnética */
            73% { opacity: 1; stroke-dashoffset: 0; stroke-width: 8; filter: drop-shadow(0 0 10px var(--glitch-magenta)); }
            75%, 90% { opacity: 1; stroke-dashoffset: 0; stroke-width: 4; filter: drop-shadow(0 0 0 transparent); }
            95%, 100% { opacity: 0; stroke-dashoffset: 1; }
        }

        /* Visibilidade dos pulsos de energia */
        @keyframes powerVisibility {
            0%, 12% { opacity: 0; filter: brightness(0); }
            13%, 45% { opacity: 1; filter: brightness(1.2); }
            46%, 49% { opacity: 1; filter: brightness(3) drop-shadow(0 0 10px var(--glitch-magenta)); }
            50%, 71% { opacity: 0; filter: brightness(0); } /* Sem energia flutuando */
            75%, 90% { opacity: 1; filter: brightness(1.2); }
            91%, 100% { opacity: 0; filter: brightness(0); }
        }

        @keyframes dataPulseFlow {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -1.05; }
        }

        /* O Texto segue a mesma física (Explode e Volta) */
        @keyframes textGlitch {
            0%, 5% { opacity: 0; letter-spacing: -10px; transform: scale(0.1); filter: blur(5px); }
            10% { opacity: 1; letter-spacing: 25px; transform: scale(1.2); filter: drop-shadow(5px 5px 0 var(--glitch-cyan)); }
            13%, 45% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 0 transparent); letter-spacing: 18px; }
            
            /* Texto é arremessado e flutua */
            50% { opacity: 0.5; transform: scale(2.5) translateY(20px); letter-spacing: 50px; filter: blur(10px); }
            65% { opacity: 0.3; transform: scale(3) translateY(30px); letter-spacing: 60px; filter: blur(15px); }
            
            /* Texto é sugado de volta */
            72% { opacity: 1; transform: scale(0.9) translateY(-5px); letter-spacing: 10px; filter: blur(2px) drop-shadow(0 0 10px var(--glitch-magenta)); }
            75%, 90% { opacity: 1; transform: scale(1) translateY(0); filter: drop-shadow(0 0 0 transparent); letter-spacing: 18px; }
            
            95%, 100% { opacity: 0; letter-spacing: -10px; transform: scale(0.1); filter: blur(5px); }
        }

        /* ==========================================
           CLASSES DOS ELEMENTOS SVG
           ========================================== */

        .puzzle-piece {
            transform-origin: center;
            transform-box: fill-box;
            animation: assemble 14s cubic-bezier(0.25, 1, 0.5, 1) infinite;
            animation-delay: var(--delay, 0s); 
        }

        .glitch-main {
            stroke: var(--cor-base);
            stroke-width: 18;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: glitchMain 14s infinite;
            animation-delay: var(--delay, 0s); 
            transform-origin: center;
            transform-box: fill-box;
        }

        .bird-part {
            fill: var(--cor-passaro);
            animation: glitchMain 14s infinite;
            animation-delay: var(--delay, 0s);
            transform-origin: center;
            transform-box: fill-box;
            mix-blend-mode: multiply;
        }

        .pcb-trace {
            stroke: var(--cor-circuito);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel; 
            stroke-dasharray: 1;
            animation: drawTrace 14s infinite;
            animation-delay: var(--delay, 0s);
        }

        .power-state {
            animation: powerVisibility 14s infinite;
            animation-delay: var(--delay, 0s);
        }

        .pcb-pulse {
            stroke: var(--cor-pulso);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel;
            stroke-dasharray: 0.05 1.05; 
            animation: dataPulseFlow 2s linear infinite;
        }

        .pcb-node-solid { fill: var(--cor-circuito); stroke: none; }
        .pcb-node-hollow { fill: var(--cor-fundo); stroke: var(--cor-circuito); stroke-width: 4; }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px; 
            font-weight: 300; 
            fill: var(--cor-texto);
            animation: textGlitch 14s infinite;
            animation-delay: var(--delay, 0s);
            transform-origin: center;
        }

        .bg-dot {
            fill: #E5EBE5;
            animation: drawTrace 14s infinite;
            animation-delay: var(--delay, 0s);
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <!-- O clarão de luz da explosão E da implosão -->
        <div class="explosion-flash"></div>

        <svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">

                <g class="power-state">
                    <path class="pcb-pulse" pathLength="1" d="M 130 350 L 160 350 L 170 340 L 170 290 L 180 280 L 205 280 L 215 290 L 215 425" />
                    <circle cx="130" cy="350" r="6" class="pcb-node-solid" />

            </g>

                <path class="pcb-trace" pathLength="1" d="M 285 425 L 285 150" />

                <g class="power-state">

                <path class="pcb-trace" pathLength="1" d="M 395 380 L 395 305 L 405 295 L 415 305 L 415 380" />
                <g class="power-state">
                    <path class="pcb-pulse" pathLength="1" d="M 365 425 L 365 200" />

                    <circle cx="390" cy="230" r="4" class="pcb-node-solid" />
                </g>
            </g>

            <g class="puzzle-piece" style="--dx: 300px; --dy: -300px; --rot: 270deg; --delay: 0.6s;">
                <path class="pcb-trace" pathLength="1" d="M 445 425 L 445 280" />
                <path class="pcb-trace" pathLength="1" d="M 475 380 L 475 245 L 485 235 L 495 245 L 495 380" />
                <path class="pcb-trace" pathLength="1" d="M 525 425 L 525 320 L 535 310 L 575 310" />

            </g>

            <!-- ========================================== -->

            <!-- ========================================== -->

            <g class="puzzle-piece" style="--dx: -150px; --dy: 300px; --rot: 45deg; --delay: 0.2s;">

                <text x="400" y="495" text-anchor="middle" class="logo-text">
                    WEB-ENGENHARIA
                </text>
            </g>

        </svg>
    </div>

</body>
