    <!-- Importando fonte para o texto -->
    <style>
        :root {
            --cor-base: #062A1B;      /* Verde escuro intenso */
            --cor-circuito: #A5C7A9;  /* Verde claro (trilhas elétricas) */
            --cor-pulso: #E2F2E4;     /* Verde super brilhante */
            --cor-passaro: #62866D;   /* Verde médio (símbolo) */
            --cor-fundo: #ffffff;
            --cor-texto: #000000;
            /* Cores do Glitch Matrix */
            --glitch-cyan: #85E8B1;   /* Verde menta luminoso */
            --glitch-magenta: #00FF41; /* Verde neon vibrante */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--cor-fundo);
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            /* Tremor de montagem e tremor de sobrecarga pré-explosão combinados */
            animation: containerShakeLoop 14s infinite;
        }

        /* Clarão da Explosão (Flash Expandido) */
        .explosion-flash {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            box-shadow: 0 0 50px 20px var(--glitch-cyan), 0 0 100px 50px var(--glitch-magenta);
            animation: flashExplode 14s infinite;
            z-index: 100;
            pointer-events: none;
        }

        /* ==========================================
           CICLO MESTRE (14 Segundos)
           ========================================== */

        /* Movimento físico das peças - Montam, carregam energia e EXPLODEM */
        @keyframes assemble {
            0%, 5% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.1); opacity: 0; filter: blur(10px); }
            12% { transform: translate(calc(var(--dx) * 0.2), calc(var(--dy) * 0.2)) rotate(calc(var(--rot) * 0.2)) scale(1.1); opacity: 1; filter: blur(2px); }
            15% { transform: translate(0, 0) rotate(0) scale(0.95); filter: blur(0px); }
            18%, 76% { transform: translate(0, 0) rotate(0) scale(1); opacity: 1; filter: blur(0px); }
            
            /* Acumulação de Energia (Shrink & Shake) */
            77%, 82% { transform: translate(0, 0) rotate(0) scale(0.93); opacity: 1; filter: blur(0px) drop-shadow(0 0 10px var(--glitch-cyan)); }
            
            /* A EXPLOSÃO (Boom!) - Disparam multiplicando a sua distância de origem */
            83% { transform: translate(calc(var(--dx) * 2.5), calc(var(--dy) * 2.5)) rotate(calc(var(--rot) * 4)) scale(2); opacity: 0; filter: blur(15px); }
            84%, 100% { transform: translate(calc(var(--dx) * 3), calc(var(--dy) * 3)) rotate(calc(var(--rot) * 5)) scale(2.5); opacity: 0; filter: blur(20px); }
        }

        /* Clarão massivo que cega o ecrã no momento do impacto */
        @keyframes flashExplode {
            0%, 82% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            82.5% { transform: translate(-50%, -50%) scale(2); opacity: 1; }
            83% { transform: translate(-50%, -50%) scale(80); opacity: 1; background: var(--glitch-cyan); }
            85%, 100% { transform: translate(-50%, -50%) scale(100); opacity: 0; }
        }

        /* Glitch principal da estrutura */
        @keyframes glitchMain {
            0%, 14% { opacity: 0; stroke-dashoffset: 1; }
            15% { opacity: 1; stroke-dashoffset: 0; transform: translateX(-10px) skewX(20deg); filter: drop-shadow(10px 0 0 var(--glitch-cyan)) drop-shadow(-10px 0 0 var(--glitch-magenta)); }
            17% { transform: translateX(10px) skewX(-10deg); filter: drop-shadow(-10px 0 0 var(--glitch-cyan)) drop-shadow(10px 0 0 var(--glitch-magenta)); }
            19%, 39% { transform: translateX(0) skewX(0); filter: drop-shadow(0 0 0 transparent); }
            
            /* Micro glitches de sistema instável */
            40% { transform: translate(-2px, 1px) skewX(-5deg); filter: drop-shadow(2px 0 0 var(--glitch-cyan)); }
            41% { transform: translate(2px, -1px) skewX(5deg); filter: drop-shadow(-2px 0 0 var(--glitch-magenta)); }
            42%, 69% { transform: translate(0, 0) skewX(0); filter: drop-shadow(0 0 0 transparent); }
            70% { transform: translate(-2px, 1px) skewX(-5deg); filter: drop-shadow(2px 0 0 var(--glitch-cyan)); }
            71% { transform: translate(2px, -1px) skewX(5deg); filter: drop-shadow(-2px 0 0 var(--glitch-magenta)); }
            72%, 82% { transform: translate(0, 0) skewX(0); filter: drop-shadow(0 0 0 transparent); }
            
            /* Fade out drástico durante a explosão */
            83%, 100% { opacity: 0; filter: drop-shadow(0 0 0 transparent); }
        }

        /* Tremor da Câmera / Container (Agressivo antes de explodir) */
        @keyframes containerShakeLoop {
            0%, 14% { transform: translate3d(0, 0, 0); filter: brightness(1); }
            /* Impacto da montagem */
            14.5% { transform: translate3d(-4px, 0, 0); }
            15% { transform: translate3d(4px, 0, 0); }
            15.5% { transform: translate3d(-2px, 0, 0); }
            16%, 76% { transform: translate3d(0, 0, 0); filter: brightness(1); }
            
            /* Sobrecarga pré-explosão (Tremor rápido) */
            77% { transform: translate3d(-2px, 2px, 0); filter: brightness(1.2); }
            78% { transform: translate3d(2px, -2px, 0); filter: brightness(0.8); }
            79% { transform: translate3d(-4px, -1px, 0); filter: brightness(1.4); }
            80% { transform: translate3d(4px, 1px, 0); filter: brightness(0.6); }
            81% { transform: translate3d(-6px, 3px, 0); filter: brightness(1.6); }
            82% { transform: translate3d(6px, -3px, 0); filter: brightness(2); }
            
            /* Explosão e retorno ao normal */
            83%, 100% { transform: translate3d(0, 0, 0); filter: brightness(1); }
        }

        @keyframes drawTrace {
            0%, 10% { opacity: 0; stroke-dashoffset: 1; }
            12% { opacity: 1; stroke-dashoffset: 0.5; filter: drop-shadow(0 0 10px var(--glitch-cyan)); stroke-width: 8; }
            15%, 82% { opacity: 1; stroke-dashoffset: 0; filter: drop-shadow(0 0 0 transparent); stroke-width: 4; }
            83%, 100% { opacity: 0; stroke-dashoffset: 1; }
        }

        @keyframes powerVisibility {
            0%, 15% { opacity: 0; filter: brightness(0); }
            16%, 76% { opacity: 1; filter: brightness(1.2); }
            /* Brilho ofuscante pré-explosão */
            77%, 82% { opacity: 1; filter: brightness(3) drop-shadow(0 0 10px var(--glitch-magenta)); }
            83%, 100% { opacity: 0; filter: brightness(0); }
        }

        @keyframes dataPulseFlow {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -1.05; }
        }

        /* Texto também "explode" para fora do ecrã */
        @keyframes textGlitch {
            0%, 14% { opacity: 0; letter-spacing: -10px; transform: scale(0.1); filter: blur(5px); }
            16% { opacity: 1; letter-spacing: 25px; transform: scale(1.2); filter: drop-shadow(5px 5px 0 var(--glitch-cyan)); }
            18% { transform: scale(1); filter: drop-shadow(-5px -5px 0 var(--glitch-magenta)); letter-spacing: 18px; }
            20%, 82% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 0 transparent); letter-spacing: 18px; }
            /* Explosão do texto - Lança-se para a frente da câmara */
            83% { opacity: 0; transform: scale(3) translateY(-10px); letter-spacing: 50px; filter: blur(10px); }
            84%, 100% { opacity: 0; transform: scale(4); letter-spacing: 60px; filter: blur(20px); }
        }

        /* ==========================================
           CLASSES DOS ELEMENTOS SVG
           ========================================== */

        .puzzle-piece {
            transform-origin: center;
            transform-box: fill-box;
            animation: assemble 14s cubic-bezier(0.25, 1, 0.5, 1) infinite;
            animation-delay: var(--delay, 0s); 
        }

        .glitch-main {
            stroke: var(--cor-base);
            stroke-width: 18;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            animation: glitchMain 14s infinite;
            animation-delay: var(--delay, 0s); 
            transform-origin: center;
            transform-box: fill-box;
        }

        .bird-part {
            fill: var(--cor-passaro);
            animation: glitchMain 14s infinite;
            animation-delay: var(--delay, 0s);
            transform-origin: center;
            transform-box: fill-box;
            mix-blend-mode: multiply;
        }

        .pcb-trace {
            stroke: var(--cor-circuito);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel; 
            stroke-dasharray: 1;
            animation: drawTrace 14s infinite;
            animation-delay: var(--delay, 0s);
        }

        .power-state {
            animation: powerVisibility 14s infinite;
            animation-delay: var(--delay, 0s);
        }

        .pcb-pulse {
            stroke: var(--cor-pulso);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel;
            stroke-dasharray: 0.05 1.05; 
            animation: dataPulseFlow 2s linear infinite;
        }

        .pcb-node-solid { fill: var(--cor-circuito); stroke: none; }
        .pcb-node-hollow { fill: var(--cor-fundo); stroke: var(--cor-circuito); stroke-width: 4; }

        .logo-text {
            font-family: system-ui, sans-serif;
            font-size: 28px; 
            font-weight: 300; 
            fill: var(--cor-texto);
            animation: textGlitch 14s infinite;
            animation-delay: var(--delay, 0s);
            transform-origin: center;
        }

        .bg-dot {
            fill: #E5EBE5;
            animation: drawTrace 14s infinite;
            animation-delay: var(--delay, 0s);
        }

    </style>
</head>
