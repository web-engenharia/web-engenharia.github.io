<!DOCTYPE html>
<html lang="pt-BR" style="
    overflow: hidden;
">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Animada - Web-Engenharia</title>
    <!-- Importando fonte para o texto -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-base: #062A1B;      /* Verde escuro intenso */
            --cor-circuito: #A5C7A9;  /* Verde claro (trilhas elétricas) */
            --cor-pulso: #E2F2E4;     /* Verde super brilhante */
            --cor-passaro: #62866D;   /* Verde médio (símbolo) */
            --cor-fundo: #ffffff;
            --cor-texto: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--cor-fundo);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .logo-container {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
        }

        /* ==========================================
           ANIMAÇÕES CORE: BLUEPRINT AWAKENING
           ========================================== */

        /* Desenho contínuo de caminhos (Trilhas e Estrutura) */
        @keyframes drawLine {
            0% { stroke-dashoffset: 1; opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 1; }
        }

        /* Pop-in com efeito de mola para os nós de conexão */
        @keyframes popNode {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* O pulso de dados correndo nas trilhas indefinidamente */
        @keyframes dataStream {
            0% { stroke-dashoffset: 0; opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { stroke-dashoffset: -1.05; opacity: 0; }
        }

        /* Materialização holográfica do pássaro */
        @keyframes materializeBird {
            0% {
                transform: translateY(-20px) scale(0.9);
                opacity: 0;
                filter: blur(8px) drop-shadow(0 0 20px var(--cor-circuito));
            }
            100% {
                transform: translateY(0px) scale(1);
                opacity: 1;
                filter: blur(0px) drop-shadow(0 0 0px transparent);
            }
        }

        /* Efeito sutil de respiração contínua para o pássaro */
        @keyframes breathe {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
        }

        /* Efeito de expansão cinematográfica para o texto */
        @keyframes expandText {
            0% {
                letter-spacing: 0px;
                opacity: 0;
                filter: blur(4px);
                transform: translateY(10px);
            }
            100% {
                letter-spacing: 18px;
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0px);
            }
        }

        /* Brilho pulsante nos pontos de energia */
        @keyframes glowNode {
            0%, 100% { filter: drop-shadow(0 0 0px transparent); fill: var(--cor-circuito); }
            50% { filter: drop-shadow(0 0 6px var(--cor-pulso)); fill: var(--cor-pulso); } 
        }

        /* Pontos de background que acendem suavemente */
        @keyframes fadeBgDot {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        /* ==========================================
           CLASSES DOS ELEMENTOS SVG
           ========================================== */

        /* TRILHAS DO CIRCUITO */
        .pcb-trace {
            stroke: var(--cor-circuito);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel; 
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            opacity: 0; 
            /* Desenha rápido no início */
            animation: drawLine 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .pcb-pulse {
            stroke: var(--cor-pulso);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: bevel;
            stroke-dasharray: 0.05 1.05; 
            stroke-dashoffset: 0;
            opacity: 0;
            /* Inicia o fluxo de dados logo após as trilhas serem desenhadas */
            animation: dataStream 2.5s linear infinite 1.5s;
        }

        /* PONTOS DE CONEXÃO */
        .pcb-node-solid {
            fill: var(--cor-circuito);
            stroke: none;
            transform-origin: center;
            transform-box: fill-box;
            transform: scale(0);
            opacity: 0;
            /* Pipocam logo após o desenho das trilhas, depois brilham */
            animation: 
                popNode 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                glowNode 3s ease-in-out infinite 2s;
        }

        .pcb-node-hollow {
            fill: var(--cor-fundo);
            stroke: var(--cor-circuito);
            stroke-width: 4;
            transform-origin: center;
            transform-box: fill-box;
            transform: scale(0);
            opacity: 0;
            animation: popNode 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* ESTRUTURA PRINCIPAL */
        .main-path {
            stroke: var(--cor-base);
            stroke-width: 18;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            opacity: 0;
            /* Começa a ser impressa quando a energia chega (1s) */
            animation: drawLine 2.5s ease-in-out 1s forwards;
        }

        /* PÁSSARO (SÍMBOLO DE LIBERDADE) */
        .bird-group {
            opacity: 0;
            transform-origin: center;
            transform-box: fill-box;
            /* Materializa majestosamente quando a estrutura está 100% pronta */
            animation: 
                materializeBird 2s cubic-bezier(0.2, 0.8, 0.2, 1) 3s forwards,
                breathe 4s ease-in-out 5s infinite forwards;
        }

        /* TEXTO DA LOGO */
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px; 
            font-weight: 300; 
            fill: var(--cor-texto);
            opacity: 0;
            /* A expansão final como assinatura do projeto */
            animation: expandText 2s cubic-bezier(0.1, 0.9, 0.2, 1) 3.5s forwards;
        }

        .bg-dot {
            fill: #E5EBE5;
            opacity: 0;
            transform-origin: center;
            transform-box: fill-box;
            animation: fadeBgDot 2s ease-out forwards;
        }

    </style>
</head>
<body>

    <div class="logo-container">
        <!-- SVG Desenhado em Camadas Funcionais -->
        <svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            
            <!-- CAMADA 0: PONTOS DE FUNDO (Aura Digital) -->
            <g>
                <circle cx="610" cy="300" r="5" class="bg-dot" style="animation-delay: 0.2s;" />
                <circle cx="500" cy="80"  r="7" class="bg-dot" style="animation-delay: 0.5s;" />
                <circle cx="410" cy="180" r="4" class="bg-dot" style="animation-delay: 0.8s;" />
                <circle cx="310" cy="140" r="6" class="bg-dot" style="animation-delay: 0.4s;" />
                <circle cx="210" cy="120" r="4" class="bg-dot" style="animation-delay: 0.7s;" />
                <circle cx="260" cy="240" r="3" class="bg-dot" style="animation-delay: 0.9s;" />
                <circle cx="580" cy="220" r="3" class="bg-dot" style="animation-delay: 0.3s;" />
            </g>

            <!-- ========================================== -->
            <!-- CAMADA 1: REDE DE ENERGIA (Trilhas e Nós)  -->
            <!-- ========================================== -->
            
            <!-- Trilha Base Inferior (Mestre) -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.0s;" pathLength="1" d="M 183 425 L 290 425 L 300 435 L 330 435 L 340 425 L 485 425 L 615 425" />
                <path class="pcb-pulse" pathLength="1" d="M 183 425 L 290 425 L 300 435 L 330 435 L 340 425 L 485 425 L 615 425" />
                <circle cx="173" cy="425" r="8" class="pcb-node-hollow" style="animation-delay: 0.5s;"/>
                <circle cx="625" cy="425" r="8" class="pcb-node-hollow" style="animation-delay: 0.8s;"/>
            </g>

            <!-- Derivação Base -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.2s;" pathLength="1" d="M 485 425 L 485 440" />
                <path class="pcb-pulse" pathLength="1" d="M 485 425 L 485 440" />
                <circle cx="485" cy="450" r="8" class="pcb-node-hollow" style="animation-delay: 0.9s;"/>
            </g>

            <!-- Módulo Zig-Zag Lado Esquerdo -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.3s;" pathLength="1" d="M 130 350 L 160 350 L 170 340 L 170 290 L 180 280 L 205 280 L 215 290 L 215 425" />
                <path class="pcb-pulse" pathLength="1" d="M 130 350 L 160 350 L 170 340 L 170 290 L 180 280 L 205 280 L 215 290 L 215 425" />
                <circle cx="130" cy="350" r="6" class="pcb-node-solid" style="animation-delay: 0.8s;"/>
                <circle cx="215" cy="425" r="4" class="pcb-node-solid" style="animation-delay: 0.9s;"/>
            </g>

            <!-- Loop 1 -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.4s;" pathLength="1" d="M 235 380 L 235 345 L 245 335 L 255 345 L 255 380" />
                <path class="pcb-pulse" pathLength="1" d="M 235 380 L 235 345 L 245 335 L 255 345 L 255 380" />
            </g>

            <!-- Antena Esquerda Alta com Ramificação -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.5s;" pathLength="1" d="M 285 425 L 285 150" />
                <path class="pcb-pulse" pathLength="1" d="M 285 425 L 285 150" />
                <circle cx="285" cy="150" r="6" class="pcb-node-solid" style="animation-delay: 1.0s;"/>
                <circle cx="285" cy="425" r="4" class="pcb-node-solid" style="animation-delay: 1.1s;"/>
                
                <path class="pcb-trace" style="animation-delay: 0.6s;" pathLength="1" d="M 285 190 L 275 180 L 260 180" />
                <path class="pcb-pulse" pathLength="1" d="M 285 190 L 275 180 L 260 180" />
                <circle cx="260" cy="180" r="4" class="pcb-node-solid" style="animation-delay: 1.1s;"/>
            </g>

            <!-- Loop 2 -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.6s;" pathLength="1" d="M 315 380 L 315 245 L 325 235 L 335 245 L 335 380" />
                <path class="pcb-pulse" pathLength="1" d="M 315 380 L 315 245 L 325 235 L 335 245 L 335 380" />
            </g>

            <!-- Antena Central com Ramificação -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.7s;" pathLength="1" d="M 365 425 L 365 200" />
                <path class="pcb-pulse" pathLength="1" d="M 365 425 L 365 200" />
                <circle cx="365" cy="200" r="5" class="pcb-node-solid" style="animation-delay: 1.2s;"/>
                <circle cx="365" cy="425" r="4" class="pcb-node-solid" style="animation-delay: 1.3s;"/>

                <path class="pcb-trace" style="animation-delay: 0.8s;" pathLength="1" d="M 365 240 L 375 230 L 390 230" />
                <path class="pcb-pulse" pathLength="1" d="M 365 240 L 375 230 L 390 230" />
                <circle cx="390" cy="230" r="4" class="pcb-node-solid" style="animation-delay: 1.3s;"/>
            </g>

            <!-- Loop 3 -->
            <g>
                <path class="pcb-trace" style="animation-delay: 0.9s;" pathLength="1" d="M 395 380 L 395 305 L 405 295 L 415 305 L 415 380" />
                <path class="pcb-pulse" pathLength="1" d="M 395 380 L 395 305 L 405 295 L 415 305 L 415 380" />
            </g>

            <!-- Antena Média -->
            <g>
                <path class="pcb-trace" style="animation-delay: 1.0s;" pathLength="1" d="M 445 425 L 445 280" />
                <path class="pcb-pulse" pathLength="1" d="M 445 425 L 445 280" />
                <circle cx="445" cy="280" r="5" class="pcb-node-solid" style="animation-delay: 1.4s;"/>
                <circle cx="445" cy="425" r="4" class="pcb-node-solid" style="animation-delay: 1.5s;"/>
            </g>

            <!-- Loop 4 -->
            <g>
                <path class="pcb-trace" style="animation-delay: 1.1s;" pathLength="1" d="M 475 380 L 475 245 L 485 235 L 495 245 L 495 380" />
                <path class="pcb-pulse" pathLength="1" d="M 475 380 L 475 245 L 485 235 L 495 245 L 495 380" />
            </g>

            <!-- Curva Lado Direito -->
            <g>
                <path class="pcb-trace" style="animation-delay: 1.2s;" pathLength="1" d="M 525 425 L 525 320 L 535 310 L 575 310" />
                <path class="pcb-pulse" pathLength="1" d="M 525 425 L 525 320 L 535 310 L 575 310" />
                <circle cx="575" cy="310" r="6" class="pcb-node-solid" style="animation-delay: 1.6s;"/>
                <circle cx="525" cy="425" r="4" class="pcb-node-solid" style="animation-delay: 1.7s;"/>
            </g>

            <!-- ========================================== -->
            <!-- CAMADA 2: ESTRUTURA PRINCIPAL              -->
            <!-- ========================================== -->
            <!-- Desenhada em um único fluxo contínuo e elegante -->
            <path class="main-path"
                  pathLength="1"
                  d="M 170 380 
                     L 220 380 L 220 310 A 25 25 0 0 1 270 310 L 270 380 
                     L 300 380 L 300 180 A 25 25 0 0 1 350 180 L 350 380 
                     L 380 380 L 380 250 A 25 25 0 0 1 430 250 L 430 380 
                     L 460 380 L 460 180 A 25 25 0 0 1 510 180 L 510 380 
                     L 590 380" />


            <!-- ========================================== -->
            <!-- CAMADA 3: PÁSSARO (MATERIALIZAÇÃO)         -->
            <!-- ========================================== -->
            <!-- Usa as asas sólidas sem sombras bugadas pedidas anteriormente -->
            <g class="bird-group">
                <path d="M 425 258 Q 440 290 475 255 Q 440 265 425 258 Z" fill="var(--cor-passaro)" opacity="0.6"/>
                <path d="M 430 260 Q 440 280 460 260 Q 440 265 430 260 Z" fill="var(--cor-passaro)" />

                <!-- Asa Esquerda -->
                <path d="M 440 265 C 380 265 330 200 290 120 C 350 140 400 210 440 235 Z" fill="var(--cor-passaro)" />
                <!-- Asa Direita -->
                <path d="M 440 235 C 480 210 540 140 600 120 C 550 200 490 265 440 265 Z" fill="var(--cor-passaro)" />
            </g>

            <!-- ========================================== -->
            <!-- CAMADA 4: TEXTO DA MARCA                   -->
            <!-- ========================================== -->
            <!-- Efeito de expansão cinematográfica das letras -->
            <text x="400" y="495" text-anchor="middle" class="logo-text">
                WEB-ENGENHARIA
            </text>

        </svg>
    </div>

</body>
</html>
